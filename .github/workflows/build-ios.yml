name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Add audio assets to iOS bundle
        run: |
          cp assets/impact_bass.wav ios/iphonehaptic/
          # pbxprojにリソースとして追加
          python3 - <<'PYEOF'
          import re
          pbx = "ios/iphonehaptic.xcodeproj/project.pbxproj"
          with open(pbx, "r") as f:
              content = f.read()
          # ファイル参照ID
          file_ref_id = "AAA0000001"
          build_file_id = "AAA0000002"
          # PBXFileReference追加
          anchor = "/* End PBXFileReference section */"
          ref_entry = f'\t\t{file_ref_id} /* impact_bass.wav */ = {{isa = PBXFileReference; lastKnownFileType = audio.wav; path = impact_bass.wav; sourceTree = "<group>"; }};\n'
          content = content.replace(anchor, ref_entry + "\t\t" + anchor)
          # PBXBuildFile追加
          anchor2 = "/* End PBXBuildFile section */"
          build_entry = f'\t\t{build_file_id} /* impact_bass.wav in Resources */ = {{isa = PBXBuildFile; fileRef = {file_ref_id} /* impact_bass.wav */; }};\n'
          content = content.replace(anchor2, build_entry + "\t\t" + anchor2)
          # PBXResourcesBuildPhase追加
          content = content.replace(
              "/* End PBXResourcesBuildPhase section */",
              ""
          )
          # リソースフェーズにファイルを追加
          resource_pattern = r'(isa = PBXResourcesBuildPhase;[^}]*files = \(\n)'
          content = re.sub(resource_pattern, r'\1\t\t\t\t' + build_file_id + ' /* impact_bass.wav in Resources */,\n', content)
          # End PBXResourcesBuildPhase sectionを戻す
          content = content.replace(
              "/* Begin PBXResourcesBuildPhase section */",
              "/* Begin PBXResourcesBuildPhase section */"
          )
          # グループにファイル参照を追加 (iphonehapticグループ)
          group_pattern = r'(path = iphonehaptic;\n\t\t\tsourceTree = "<group>";\n\t\t\tchildren = \(\n)'
          content = re.sub(group_pattern, r'\1\t\t\t\t' + file_ref_id + ' /* impact_bass.wav */,\n', content)
          with open(pbx, "w") as f:
              f.write(content)
          print("Added impact_bass.wav to Xcode project")
          PYEOF

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build unsigned IPA
        run: |
          cd ios
          xcodebuild \
            -workspace iphonehaptic.xcworkspace \
            -scheme iphonehaptic \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath build/iphonehaptic.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r ios/build/iphonehaptic.xcarchive/Products/Applications/iphonehaptic.app build/Payload/
          cd build
          zip -r iphonehaptic.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iphonehaptic-ipa
          path: build/iphonehaptic.ipa
